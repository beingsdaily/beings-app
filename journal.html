<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beings Journal — Pro</title>

<!-- Apply skin before paint -->
<script>
  (function(){
    var s = localStorage.getItem('beings_skin') || '';
    if (s) document.documentElement.setAttribute('data-skin', s);
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════════════════
   ROOT — warm dark sanctuary
══════════════════════════════════════════════════════ */
:root {
  --bg:           #0f0c08;
  --bg2:          #151008;
  --bg-card:      #1a140a;
  --bg-card2:     #201a0e;
  --bg-input:     #120e07;
  --text:         #f0e8d5;
  --text-dim:     rgba(240,232,213,0.50);
  --text-faint:   rgba(240,232,213,0.24);
  --accent:       #c4622d;
  --accent-glow:  rgba(196,98,45,0.28);
  --accent-pale:  rgba(196,98,45,0.10);
  --lav:          #b9a9cc;
  --lav-glow:     rgba(185,169,204,0.18);
  --lav-pale:     rgba(185,169,204,0.07);
  --pro:          #c4a24a;
  --border:       rgba(240,232,213,0.07);
  --border-md:    rgba(240,232,213,0.11);
  --border-accent:rgba(196,98,45,0.20);
  --divider:      rgba(240,232,213,0.06);
}

/* Skin-aware accent overrides */
[data-skin="shadow"]   { --accent:#a78bfa; --accent-glow:rgba(167,139,250,0.28); --accent-pale:rgba(167,139,250,0.10); --border-accent:rgba(167,139,250,0.20); }
[data-skin="earth"]    { --accent:#a3785a; --accent-glow:rgba(163,120,90,0.28);  --accent-pale:rgba(163,120,90,0.10);  --border-accent:rgba(163,120,90,0.20);  }
[data-skin="ocean"]    { --accent:#2dd4bf; --accent-glow:rgba(45,212,191,0.25);  --accent-pale:rgba(45,212,191,0.08);  --border-accent:rgba(45,212,191,0.20);  }
[data-skin="bloom"]    { --accent:#e07db8; --accent-glow:rgba(224,125,184,0.28); --accent-pale:rgba(224,125,184,0.09); --border-accent:rgba(224,125,184,0.20); }
[data-skin="gold"]     { --accent:#c4a24a; --accent-glow:rgba(196,162,74,0.28);  --accent-pale:rgba(196,162,74,0.10);  --border-accent:rgba(196,162,74,0.20);  }
[data-skin="ascended"] { --accent:#a855f7; --accent-glow:rgba(168,85,247,0.30);  --accent-pale:rgba(168,85,247,0.10);  --border-accent:rgba(168,85,247,0.20);  }

/* ══════════════════════════════════════════════════════
   RESET + BASE
══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; border: none; background: none; }
::selection { background: var(--accent); color: var(--bg); }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', serif;
  font-weight: 400;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grain texture — warm analog quality */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.032;
  pointer-events: none;
  z-index: 0;
}

/* Warm atmospheric glow — top right, very subtle */
body::after {
  content: '';
  position: fixed;
  top: -200px; right: -200px;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
  transition: background 0.6s ease;
}

/* ══════════════════════════════════════════════════════
   PAGE WRAPPER
══════════════════════════════════════════════════════ */
.page {
  position: relative; z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 0 28px 100px;
}

/* ══════════════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════════════ */
.site-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 36px 0 28px;
  border-bottom: 1px solid var(--divider);
  margin-bottom: 36px;
  animation: fadeUp 0.7s ease both;
}

.wordmark-group {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
}

.wm-beings {
  font-family: 'Fraunces', serif;
  font-optical-sizing: auto;
  font-size: 1.55rem;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--text);
  transition: color 0.2s;
}
.wm-beings:hover { color: var(--accent); }

.wm-journal {
  font-family: 'Fraunces', serif;
  font-optical-sizing: auto;
  font-size: 1.55rem;
  font-weight: 300;
  font-style: italic;
  color: var(--accent);
}

.pro-badge {
  font-family: 'DM Mono', monospace;
  font-size: 0.50rem;
  font-weight: 400;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--pro);
  border: 1px solid rgba(196,162,74,0.45);
  padding: 2px 7px;
  border-radius: 3px;
  vertical-align: super;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

#rank-badge-mount { display: flex; align-items: center; }

.icon-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  transition: border-color 0.2s, color 0.2s;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ══════════════════════════════════════════════════════
   DATE LINE
══════════════════════════════════════════════════════ */
.date-line {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  font-weight: 300;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 40px;
  animation: fadeUp 0.7s 0.08s ease both;
}

/* ══════════════════════════════════════════════════════
   SECTION LABELS
══════════════════════════════════════════════════════ */
.section-tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  font-weight: 300;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--accent);
  display: block;
  margin-bottom: 16px;
}

/* ══════════════════════════════════════════════════════
   MOOD CARDS — large, reactive, satisfying
══════════════════════════════════════════════════════ */
.mood-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 44px;
  animation: fadeUp 0.7s 0.14s ease both;
}

@media (max-width: 560px) {
  .mood-grid { grid-template-columns: repeat(5, 1fr); gap: 7px; }
}

.mood-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 20px 8px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.25s, background 0.25s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.mood-card::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--mood-color, var(--accent));
  opacity: 0;
  transition: opacity 0.3s;
}

.mood-card:hover { transform: translateY(-2px); border-color: var(--border-md); }

.mood-card.selected {
  border-color: var(--mood-color);
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 0 1px var(--mood-color);
}

.mood-card.selected::before { opacity: 0.07; }

.mood-emoji {
  font-size: 1.9rem;
  line-height: 1;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; z-index: 1;
}

.mood-card.selected .mood-emoji { transform: scale(1.22); }

.mood-word {
  font-family: 'DM Mono', monospace;
  font-size: 0.52rem;
  font-weight: 300;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-faint);
  position: relative; z-index: 1;
  transition: color 0.2s;
}

.mood-card.selected .mood-word { color: var(--mood-color); opacity: 0.9; }

/* Mood-specific colors as custom props */
.mood-card[data-mood="peaceful"] { --mood-color: #7a9e7e; }
.mood-card[data-mood="grateful"] { --mood-color: #b9a9cc; }
.mood-card[data-mood="heavy"]    { --mood-color: #8a7a6a; }
.mood-card[data-mood="uncertain"]{ --mood-color: #9a9ab2; }
.mood-card[data-mood="alive"]    { --mood-color: #c4a24a; }

/* ══════════════════════════════════════════════════════
   JOURNAL CANVAS — the sacred writing space
══════════════════════════════════════════════════════ */
.canvas-section { animation: fadeUp 0.7s 0.20s ease both; }

.canvas-wrap {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
  margin-bottom: 10px;
}

.canvas-wrap:focus-within {
  border-color: var(--border-accent);
  box-shadow: 0 0 0 3px var(--accent-pale), 0 20px 60px rgba(0,0,0,0.25);
}

/* Subtle candlelight vignette inside the canvas */
.canvas-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(15,12,8,0.35) 100%);
  pointer-events: none;
  z-index: 1;
}

#entry {
  width: 100%;
  min-height: 260px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Lora', serif;
  font-size: 1.12rem;
  font-weight: 400;
  line-height: 2;
  padding: 32px 36px 28px;
  resize: vertical;
  outline: none;
  letter-spacing: 0.015em;
  position: relative; z-index: 2;
  transition: color 0.3s;
}

#entry::placeholder {
  color: var(--text-faint);
  font-style: italic;
}

.word-count-row {
  display: flex;
  justify-content: flex-end;
  padding: 10px 36px 20px;
  position: relative; z-index: 2;
}

.word-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--text-faint);
}

/* ══════════════════════════════════════════════════════
   ACTIONS ROW
══════════════════════════════════════════════════════ */
.actions-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  animation: fadeUp 0.7s 0.26s ease both;
}

.btn-reflect {
  background: var(--accent);
  color: var(--bg);
  font-family: 'DM Mono', monospace;
  font-size: 0.70rem;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 14px 32px;
  border-radius: 99px;
  border: none;
  transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
}

.btn-reflect:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px var(--accent-glow);
}

.btn-reflect:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-soft {
  background: none;
  border: 1px solid var(--border-md);
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: 0.66rem;
  font-weight: 300;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 13px 22px;
  border-radius: 99px;
  transition: border-color 0.2s, color 0.2s;
}

.btn-soft:hover { border-color: var(--accent); color: var(--accent); }

.btn-lav {
  color: var(--lav);
  border-color: rgba(185,169,204,0.20);
}
.btn-lav:hover { border-color: var(--lav) !important; color: var(--lav) !important; }

/* Privacy note */
.privacy-note {
  font-family: 'DM Mono', monospace;
  font-size: 0.56rem;
  letter-spacing: 0.10em;
  color: var(--text-faint);
  margin-bottom: 44px;
  animation: fadeUp 0.7s 0.30s ease both;
}

/* ══════════════════════════════════════════════════════
   RESPONSE AREA — Claude speaks
══════════════════════════════════════════════════════ */
.response-area {
  display: none;
  margin-bottom: 44px;
  animation: fadeUp 0.6s ease both;
}
.response-area.visible { display: block; }

.response-divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}
.response-divider-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.response-divider-mark {
  font-size: 1rem;
  color: var(--accent);
  opacity: 0.7;
  flex-shrink: 0;
}

.response-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.56rem;
  font-weight: 300;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
}

.response-text {
  font-family: 'Lora', serif;
  font-size: 1.06rem;
  font-weight: 400;
  line-height: 1.95;
  color: var(--text-dim);
  white-space: pre-wrap;
}

/* Follow-up question — prominent lavender box */
.follow-up-wrap {
  display: none;
  margin-top: 28px;
  padding: 24px 28px 26px;
  background: var(--lav-pale);
  border: 1px solid rgba(185,169,204,0.18);
  border-left: 3px solid var(--lav);
  border-radius: 0 14px 14px 0;
  animation: fadeUp 0.4s ease both;
}
.follow-up-wrap.visible { display: block; }

.follow-up-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.54rem;
  font-weight: 300;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--lav);
  margin-bottom: 12px;
  opacity: 0.85;
}

.follow-up-text {
  font-family: 'Fraunces', serif;
  font-optical-sizing: auto;
  font-style: italic;
  font-size: 1.18rem;
  font-weight: 300;
  line-height: 1.7;
  color: var(--lav);
}

/* Loading dots */
.dots { display: inline-flex; gap: 5px; align-items: center; padding: 8px 0; }
.dots span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
  animation: dotPulse 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.18s; }
.dots span:nth-child(3) { animation-delay: 0.36s; }

@keyframes dotPulse {
  0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
  40%           { transform: scale(1);   opacity: 1; }
}

/* ══════════════════════════════════════════════════════
   DIVIDER
══════════════════════════════════════════════════════ */
.section-divider {
  border: none;
  border-top: 1px solid var(--divider);
  margin: 52px 0 44px;
}

/* ══════════════════════════════════════════════════════
   HISTORY — accordion cards
══════════════════════════════════════════════════════ */
.history-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 20px;
}

.history-title {
  font-family: 'Fraunces', serif;
  font-optical-sizing: auto;
  font-size: 1.4rem;
  font-weight: 300;
  letter-spacing: -0.01em;
  color: var(--text);
}

.history-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.60rem;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--text-faint);
}

.history-list { display: flex; flex-direction: column; gap: 8px; }

.h-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  border-left: 3px solid var(--h-mood-color, var(--border));
}

.h-card:hover { background: var(--bg-card2); border-color: var(--border-md); }
.h-card.open  { border-color: var(--h-mood-color, var(--border-md)); }

.h-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  gap: 12px;
}

.h-card-left {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.h-mood-emoji {
  font-size: 1rem;
  line-height: 1;
  flex-shrink: 0;
}

.h-date {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  font-weight: 300;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  white-space: nowrap;
}

.h-mood-word {
  font-family: 'DM Mono', monospace;
  font-size: 0.56rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--h-mood-color, var(--text-faint));
  white-space: nowrap;
}

.h-chevron {
  color: var(--text-faint);
  font-size: 0.7rem;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.h-card.open .h-chevron { transform: rotate(180deg); }

.h-card-body {
  display: none;
  padding: 0 20px 20px;
}
.h-card.open .h-card-body { display: block; }

.h-preview {
  font-size: 0.88rem;
  line-height: 1.75;
  color: var(--text-faint);
  margin-bottom: 14px;
  white-space: pre-wrap;
}

.h-insights-block {
  border-left: 2px solid rgba(185,169,204,0.22);
  padding-left: 16px;
  font-size: 0.85rem;
  line-height: 1.75;
  color: var(--lav);
  font-style: italic;
  white-space: pre-wrap;
}

.h-empty {
  padding: 52px 20px;
  text-align: center;
  font-family: 'Fraunces', serif;
  font-optical-sizing: auto;
  font-style: italic;
  font-weight: 300;
  color: var(--text-faint);
  font-size: 1.05rem;
  border: 1px solid var(--border);
  border-radius: 14px;
}

/* ══════════════════════════════════════════════════════
   TOOLS ROW
══════════════════════════════════════════════════════ */
.tools-row {
  display: flex;
  gap: 10px;
  margin-top: 28px;
  flex-wrap: wrap;
}

/* ══════════════════════════════════════════════════════
   WEEKLY INSIGHTS — dramatic reveal
══════════════════════════════════════════════════════ */
.weekly-wrap {
  display: none;
  margin-top: 28px;
  background: var(--bg-card);
  border: 1px solid rgba(185,169,204,0.18);
  border-radius: 18px;
  overflow: hidden;
  animation: fadeUp 0.5s ease both;
}
.weekly-wrap.visible { display: block; }

.weekly-header {
  background: rgba(185,169,204,0.06);
  border-bottom: 1px solid rgba(185,169,204,0.12);
  padding: 20px 28px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.weekly-mark {
  font-size: 1rem;
  color: var(--lav);
}

.weekly-header-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  font-weight: 300;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--lav);
}

.weekly-body {
  padding: 28px;
}

.weekly-text {
  font-family: 'Lora', serif;
  font-size: 0.96rem;
  line-height: 1.9;
  color: var(--text-dim);
  white-space: pre-wrap;
}

/* ══════════════════════════════════════════════════════
   SETTINGS MODAL
══════════════════════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(15,12,8,0.88);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop.open { display: flex; }

.modal-box {
  background: var(--bg-card);
  border: 1px solid var(--border-md);
  border-radius: 20px;
  padding: 28px;
  width: min(420px, 100%);
  animation: fadeUp 0.2s ease both;
}

.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}

.modal-title {
  font-family: 'Fraunces', serif;
  font-optical-sizing: auto;
  font-size: 1.1rem;
  font-weight: 300;
  color: var(--text);
}

.modal-close-btn {
  color: var(--text-dim);
  font-size: 1.2rem;
  line-height: 1;
  padding: 4px 8px;
  border-radius: 6px;
  transition: color 0.15s;
}
.modal-close-btn:hover { color: var(--text); }

.modal-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
  display: block;
}

.modal-input-wrap {
  display: flex;
  background: var(--bg-input);
  border: 1px solid var(--border-md);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
.modal-input-wrap:focus-within { border-color: var(--accent); }

.modal-input-wrap input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  padding: 12px 14px;
  min-width: 0;
}
.modal-input-wrap input::placeholder { color: var(--text-faint); }

.modal-eye-btn {
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: 0.60rem;
  letter-spacing: 0.08em;
  padding: 0 14px;
  transition: color 0.15s;
  border-left: 1px solid var(--border);
}
.modal-eye-btn:hover { color: var(--text); }

.modal-save-btn {
  width: 100%;
  background: var(--accent);
  color: var(--bg);
  font-family: 'DM Mono', monospace;
  font-size: 0.70rem;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 13px;
  border-radius: 10px;
  transition: opacity 0.2s;
}
.modal-save-btn:hover { opacity: 0.88; }

.modal-status {
  margin-top: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 0.64rem;
  letter-spacing: 0.08em;
  color: var(--accent);
  text-align: center;
  min-height: 1em;
}

/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--bg-card2);
  border: 1px solid var(--border-md);
  color: var(--text-dim);
  font-family: 'DM Mono', monospace;
  font-size: 0.66rem;
  letter-spacing: 0.10em;
  padding: 10px 22px;
  border-radius: 99px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s, transform 0.22s;
  z-index: 500;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════════════════════
   PRINT STYLES
══════════════════════════════════════════════════════ */
.print-header { display: none; }

@media print {
  body { background: #fff; color: #1a1a1a; }
  body::before, body::after { display: none; }
  .page { max-width: 100%; padding: 0; }
  .site-header, .date-line, .canvas-section, .actions-row,
  .privacy-note, .response-area, .tools-row, .modal-backdrop,
  .toast, .section-tag { display: none !important; }
  .section-divider { border-color: #ddd; }
  .history-title { color: #1a1a1a; }
  .h-card { background: #fff; border: none; border-bottom: 1px solid #eee; border-radius: 0; }
  .h-card-body { display: block !important; }
  .h-date { color: #666; }
  .h-preview { color: #333; }
  .h-insights-block { color: #555; border-left-color: #ccc; }
  .h-chevron { display: none; }
  .weekly-wrap { display: none !important; }
  .print-header {
    display: block !important;
    font-family: Georgia, serif;
    font-size: 1.8rem;
    margin-bottom: 2rem;
    border-bottom: 2px solid #ccc;
    padding-bottom: 0.75rem;
    color: #1a1a1a;
  }
}

/* ══════════════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════════════ */
@media (max-width: 560px) {
  .mood-card { padding: 16px 4px 12px; border-radius: 12px; }
  .mood-emoji { font-size: 1.5rem; }
  .mood-word { font-size: 0.48rem; }
  #entry { padding: 24px 20px 20px; }

  .actions-row { gap: 8px; }
  .btn-reflect { flex: 1; text-align: center; }

}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }
</style>

<body>

  <header class="site-header">

      <div class="weekly-text" id="weeklyText"></div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const LS_ENTRIES = 'beings_journal_v1';
const LS_KEY     = 'beings_key';
const API_URL    = 'https://api.anthropic.com/v1/messages';
const MODEL      = 'claude-sonnet-4-6';

// Mood colors for reactive theming
const MOOD_ACCENTS = {
  peaceful:  { accent: '#7a9e7e', glow: 'rgba(122,158,126,0.28)', pale: 'rgba(122,158,126,0.10)' },
  grateful:  { accent: '#b9a9cc', glow: 'rgba(185,169,204,0.28)', pale: 'rgba(185,169,204,0.10)' },
  heavy:     { accent: '#8a7a6a', glow: 'rgba(138,122,106,0.25)', pale: 'rgba(138,122,106,0.10)' },
  uncertain: { accent: '#9a9ab2', glow: 'rgba(154,154,178,0.25)', pale: 'rgba(154,154,178,0.10)' },
  alive:     { accent: '#c4a24a', glow: 'rgba(196,162,74,0.30)',  pale: 'rgba(196,162,74,0.10)'  },
};

const MOOD_EMOJIS = {
  peaceful: '🌊', grateful: '🤍', heavy: '🌧️', uncertain: '🌀', alive: '✨',
};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let selectedMood = null;
let skinAccent   = null; // stores original skin accent

// ═══════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════
function loadEntries() {
  try { return JSON.parse(localStorage.getItem(LS_ENTRIES) || '[]'); } catch { return []; }
}
function saveEntries(entries) {
  try { localStorage.setItem(LS_ENTRIES, JSON.stringify(entries)); } catch {}
}
function getApiKey() {
  return localStorage.getItem(LS_KEY) || '';
}

// ═══════════════════════════════════════════════════
// DATE
// ═══════════════════════════════════════════════════
function renderDate() {
  const d = new Date();
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateLine').textContent =
    `${days[d.getDay()]} · ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(iso) {
  const d = new Date(iso);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

// ═══════════════════════════════════════════════════
// SKIN AWARENESS
// ═══════════════════════════════════════════════════
function captureSkinAccent() {
  // Store the computed skin accent before any mood overrides
  const root = getComputedStyle(document.documentElement);
  skinAccent = {
    accent: root.getPropertyValue('--accent').trim(),
    glow:   root.getPropertyValue('--accent-glow').trim(),
    pale:   root.getPropertyValue('--accent-pale').trim(),
  };
}

function applyAccent(colors) {
  const root = document.documentElement;
  root.style.setProperty('--accent',      colors.accent);
  root.style.setProperty('--accent-glow', colors.glow);
  root.style.setProperty('--accent-pale', colors.pale);
}

function revertToSkinAccent() {
  if (!skinAccent) return;
  applyAccent(skinAccent);
}

// ═══════════════════════════════════════════════════
// MOOD
// ═══════════════════════════════════════════════════
function selectMood(mood) {
  selectedMood = mood;

  document.querySelectorAll('.mood-card').forEach(btn => {
    const isThis = btn.dataset.mood === mood;
    btn.classList.toggle('selected', isThis);
    btn.setAttribute('aria-pressed', String(isThis));
  });

  // Mood-reactive theming — the whole page shifts
  if (MOOD_ACCENTS[mood]) {
    applyAccent(MOOD_ACCENTS[mood]);
  }
}

// ═══════════════════════════════════════════════════
// WORD COUNT
// ═══════════════════════════════════════════════════
function updateWordCount() {
  const text  = document.getElementById('entry').value.trim();
  const count = text ? text.split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = count;
}

// ═══════════════════════════════════════════════════
// API CALL
// ═══════════════════════════════════════════════════
async function callClaude(prompt) {
  const key = getApiKey();
  if (!key) {
    showToast('Add your API key via the settings icon');
    throw new Error('No API key');
  }
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-calls': 'true',
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 800,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

// ═══════════════════════════════════════════════════
// REFLECT
// ═══════════════════════════════════════════════════
async function reflect() {
  const content = document.getElementById('entry').value.trim();
  if (!content) { showToast('Write something first'); return; }

  const btn     = document.getElementById('reflectBtn');
  btn.disabled  = true;
  btn.textContent = 'Reflecting…';

  const area    = document.getElementById('responseArea');
  const respText = document.getElementById('responseText');
  const fuWrap  = document.getElementById('followUpWrap');
  const fuText  = document.getElementById('followUpText');

  area.classList.add('visible');
  fuWrap.classList.remove('visible');
  respText.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

  const moodLine = selectedMood ? `Mood: ${selectedMood}` : '';

  const prompt = `You are a gentle, wise presence within Beings — a journaling app rooted in the belief that every person is already whole. Someone has just finished writing a journal entry. Read it with care and offer exactly 3 warm, grounded insights. Do not give advice. Do not try to fix anything. Instead, reflect what you notice with tenderness — affirm their wholeness, name what you see, invite curiosity. Speak in second person. Keep each insight 2–3 sentences.

After the insights, write one deeper question on its own line, preceded by a tilde (~). The question should invite them to go further, not solve anything.

${moodLine}

Their entry:
${content}

Format exactly as:
[First insight]

[Second insight]

[Third insight]

~ [One question]`;

  try {
    const response = await callClaude(prompt);

    const tildeIdx = response.lastIndexOf('\n~');
    let insights = response;
    let question = '';

    if (tildeIdx !== -1) {
      insights = response.slice(0, tildeIdx).trim();
      question  = response.slice(tildeIdx).replace(/^\s*~\s*/, '').trim();
    }

    respText.textContent = insights;

    if (question) {
      fuText.textContent = question;
      fuWrap.classList.add('visible');
    }

    saveEntry(true, insights, question);
    area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  } catch (e) {
    respText.textContent = e.message.includes('API key') ? '' : `Something went quiet. ${e.message}`;
    if (e.message.includes('API key')) area.classList.remove('visible');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Reflect with Claude';
  }
}

// ═══════════════════════════════════════════════════
// SAVE ENTRY
// ═══════════════════════════════════════════════════
function saveEntry(withInsights = false, insights = '', followUp = '') {
  const content = document.getElementById('entry').value.trim();
  if (!content) { if (!withInsights) showToast('Nothing to save'); return; }

  const entries = loadEntries();
  entries.unshift({
    id:       Date.now().toString(),
    date:     new Date().toISOString(),
    dateKey:  todayKey(),
    mood:     selectedMood,
    content,
    insights: insights || null,
    followUp: followUp || null,
  });

  if (entries.length > 365) entries.length = 365;
  saveEntries(entries);

  if (!withInsights) {
    showToast('Entry saved');
    clearCanvas();
  }

  renderHistory();

  if (window.BeingsRanks) {
    BeingsRanks.init('rank-badge-mount');
  }
}

function clearCanvas() {
  document.getElementById('entry').value = '';
  updateWordCount();
  document.getElementById('responseArea').classList.remove('visible');
  document.getElementById('followUpWrap').classList.remove('visible');
  selectedMood = null;
  document.querySelectorAll('.mood-card').forEach(b => {
    b.classList.remove('selected');
    b.setAttribute('aria-pressed', 'false');
  });
  revertToSkinAccent();
}

// ═══════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════
const MOOD_COLORS_MAP = {
  peaceful:  '#7a9e7e',
  grateful:  '#b9a9cc',
  heavy:     '#8a7a6a',
  uncertain: '#9a9ab2',
  alive:     '#c4a24a',
};

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderHistory() {
  const entries = loadEntries();
  const area    = document.getElementById('historyArea');
  const counter = document.getElementById('historyCount');

  counter.textContent = entries.length === 1 ? '1 entry' : `${entries.length} entries`;

  if (!entries.length) {
    area.innerHTML = '<div class="h-empty">Your entries will appear here — this is where you start becoming.</div>';
    return;
  }

  const html = '<div class="history-list">' + entries.map((e, i) => {
    const preview  = e.content.length > 200 ? e.content.slice(0, 200).trimEnd() + '…' : e.content;
    const moodColor = MOOD_COLORS_MAP[e.mood] || 'var(--border)';
    const moodEmoji = e.mood ? (MOOD_EMOJIS[e.mood] || '') : '';
    const moodWord  = e.mood || '';
    const insights  = e.insights
      ? `<div class="h-insights-block">${escHtml(e.insights)}</div>` : '';

    return `
<div class="h-card" id="hcard-${i}" onclick="toggleEntry(${i})"
     style="--h-mood-color:${moodColor}">
  <div class="h-card-head">
    <div class="h-card-left">
      ${moodEmoji ? `<span class="h-mood-emoji">${moodEmoji}</span>` : ''}
      <span class="h-date">${fmtDate(e.date)}</span>
      ${moodWord ? `<span class="h-mood-word">${moodWord}</span>` : ''}
    </div>
    <span class="h-chevron">▾</span>
  </div>
  <div class="h-card-body">
    <div class="h-preview">${escHtml(preview)}</div>
    ${insights}
  </div>
</div>`;
  }).join('') + '</div>';

  area.innerHTML = html;
}

function toggleEntry(i) {
  const el = document.getElementById(`hcard-${i}`);
  if (el) el.classList.toggle('open');
}

// ═══════════════════════════════════════════════════
// WEEKLY INSIGHTS
// ═══════════════════════════════════════════════════
async function weeklyInsights() {
  const entries = loadEntries();
  const cutoff  = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const recent  = entries.filter(e => new Date(e.date).getTime() >= cutoff);

  if (!recent.length) { showToast('No entries from the last 7 days'); return; }
  if (window.BeingsRanks) { BeingsRanks.recordInsightView(); BeingsRanks.init('rank-badge-mount'); }

  const wrap = document.getElementById('weeklyWrap');
  const text = document.getElementById('weeklyText');
  wrap.classList.add('visible');
  text.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  const formatted = recent.map((e, i) =>
    `Entry ${i + 1} — ${fmtDate(e.date)}${e.mood ? ` (${e.mood})` : ''}:\n${e.content}`
  ).join('\n\n---\n\n');

  const prompt = `You are a gentle, wise presence within Beings. Someone has shared their last 7 days of journal entries. Read them with care and offer a warm, honest pattern analysis. Notice recurring themes, emotional textures, quiet moments of courage or growth. Then offer one gentle invitation for the week ahead — not a task, but an orientation toward something.

Speak with depth and warmth. Affirm their wholeness. Do not give advice.

Entries:
${formatted}

Format your response as:

Themes this week
[2–3 sentences on what you notice recurring]

Moments of note
[2–3 sentences on something meaningful you see]

A gentle invitation
[1–2 sentences offering a soft direction for the week ahead]`;

  try {
    const response = await callClaude(prompt);
    text.innerHTML = response
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^([A-Z][^\n]+)\n/gm, '<span style="font-family:\'DM Mono\',monospace;font-size:0.56rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--lav);display:block;margin-bottom:8px;margin-top:20px">$1</span>');
  } catch (e) {
    text.textContent = e.message;
  }
}

// EXPORT PDF
// ═══════════════════════════════════════════════════
function exportPDF() {
  document.querySelectorAll('.h-card').forEach(el => el.classList.add('open'));
  window.print();
  setTimeout(() => {
    document.querySelectorAll('.h-card').forEach(el => el.classList.remove('open'));
  }, 1000);
}

// ═══════════════════════════════════════════════════
// MODAL (API KEY)
// ═══════════════════════════════════════════════════
function openModal() {
  const input = document.getElementById('apiKeyInput');
  input.value = getApiKey();
  input.type  = 'password';
  document.getElementById('eyeBtn').textContent = 'show';
  document.getElementById('modalStatus').textContent = '';
  document.getElementById('modalBackdrop').classList.add('open');
  setTimeout(() => input.focus(), 50);
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}
function handleBackdropClick(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
}
function toggleKeyVis() {
  const input = document.getElementById('apiKeyInput');
  const btn   = document.getElementById('eyeBtn');
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  btn.textContent = show ? 'hide' : 'show';
}
function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (val) localStorage.setItem(LS_KEY, val);
  else localStorage.removeItem(LS_KEY);
  document.getElementById('modalStatus').textContent = val ? 'Saved.' : 'Cleared.';
  setTimeout(closeModal, 900);
}
document.getElementById('apiKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter')  saveKey();
  if (e.key === 'Escape') closeModal();
});

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

renderHistory();

setTimeout(captureSkinAccent, 0);
