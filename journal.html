<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beings Journal — Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0e1a1a;
  --bg2:     #0b1412;
  --card:    rgba(255,255,255,0.032);
  --card-hi: rgba(255,255,255,0.05);
  --sage:    #7a9e7e;
  --lav:     #b9a9cc;
  --cream:   #e8e0d0;
  --muted:   rgba(232,224,208,0.38);
  --border:  rgba(122,158,126,0.15);
  --border2: rgba(185,169,204,0.12);
  --red:     #cc7878;
  --pro:     #c4a24a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.022;
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin: 0 auto;
  padding: 0 1.5rem 6rem;
}

/* ── Header ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2.5rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 3rem;
}

.wordmark {
  display: flex;
  align-items: baseline;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.wordmark-beings {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 300;
  letter-spacing: 0.06em;
  color: var(--cream);
  text-decoration: none;
}

.wordmark-journal {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-style: italic;
  font-weight: 300;
  color: var(--sage);
}

.pro-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.22em;
  color: var(--pro);
  border: 1px solid rgba(196,162,74,0.45);
  padding: 0.14rem 0.42rem;
  border-radius: 2px;
  margin-left: 0.15rem;
  vertical-align: super;
}

.settings-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  transition: border-color 0.2s, color 0.2s;
  flex-shrink: 0;
}
.settings-btn:hover { border-color: var(--sage); color: var(--sage); }

/* ── Date line ── */
.date-line {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2.5rem;
}

/* ── Mood picker ── */
.section-label {
  font-size: 0.58rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--sage);
  display: block;
  margin-bottom: 1rem;
}

.mood-grid {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 2.5rem;
  flex-wrap: wrap;
}

.mood-btn {
  flex: 1;
  min-width: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.55rem;
  padding: 1rem 0.75rem 0.85rem;
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 0.6rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  position: relative;
  transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
}

.mood-btn:hover {
  border-color: rgba(232,224,208,0.2);
  color: var(--cream);
}

.mood-btn.selected {
  border-color: var(--sage);
  color: var(--sage);
  background: rgba(122,158,126,0.1);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(122,158,126,0.12);
}

.mood-btn svg { transition: opacity 0.2s; opacity: 0.55; }
.mood-btn:hover svg,
.mood-btn.selected svg { opacity: 1; }

.mood-btn.selected::after {
  content: '';
  display: block;
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 2px;
  background: var(--sage);
  border-radius: 1px;
}

/* ── Journal canvas ── */
#entry {
  width: 100%;
  min-height: 240px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 0;
  color: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.18rem;
  font-weight: 300;
  line-height: 1.85;
  padding: 1.5rem;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 0.01em;
}

#entry::placeholder {
  color: var(--muted);
  opacity: 0.5;
}

#entry:focus { border-color: rgba(122,158,126,0.35); }

.word-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  text-align: right;
  margin-top: 0.45rem;
  margin-bottom: 1.5rem;
}

/* ── Action buttons ── */
.actions {
  display: flex;
  gap: 0.75rem;
  margin-bottom: 2.5rem;
  flex-wrap: wrap;
}

.btn-primary {
  background: var(--sage);
  border: none;
  color: var(--bg2);
  font-family: 'Inter', sans-serif;
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0.75rem 2rem;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-primary:hover:not(:disabled) { background: #8db492; }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-secondary {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0.75rem 1.5rem;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-secondary:hover { border-color: var(--sage); color: var(--sage); }
.btn-secondary.lav:hover { border-color: var(--lav); color: var(--lav); }

/* ── Response area ── */
.response-area {
  border-left: 2px solid var(--border2);
  padding-left: 1.75rem;
  margin-bottom: 2.5rem;
  display: none;
  animation: fadeIn 0.4s ease;
}
.response-area.visible { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.response-label {
  font-size: 0.57rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--lav);
  margin-bottom: 1.25rem;
}

.response-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.12rem;
  line-height: 1.9;
  color: var(--cream);
  white-space: pre-wrap;
}

.follow-up-wrap {
  margin-top: 1.75rem;
  padding: 1.25rem 1.5rem 1.35rem;
  background: rgba(185,169,204,0.07);
  border: 1px solid rgba(185,169,204,0.22);
  border-left: 3px solid var(--lav);
  display: none;
  animation: fadeIn 0.4s ease;
}
.follow-up-wrap.visible { display: block; }

.follow-up-label {
  font-size: 0.55rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--lav);
  margin-bottom: 0.7rem;
  opacity: 0.8;
}

.follow-up-text {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.18rem;
  line-height: 1.8;
  color: var(--lav);
}

/* ── Loading dots ── */
.dots {
  display: inline-flex;
  gap: 5px;
  align-items: center;
  padding: 0.5rem 0;
}
.dots span {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--lav);
  animation: dp 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.18s; }
.dots span:nth-child(3) { animation-delay: 0.36s; }

@keyframes dp {
  0%, 80%, 100% { transform: scale(0.55); opacity: 0.35; }
  40%           { transform: scale(1);    opacity: 1; }
}

/* ── Divider ── */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 3rem 0;
}

/* ── History ── */
.history-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 1.5rem;
}

.history-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--cream);
}

.history-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.h-entry {
  background: var(--bg);
  cursor: pointer;
  transition: background 0.15s;
}
.h-entry:hover { background: var(--card-hi); }

.h-entry-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.25rem;
}

.h-entry-left {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  min-width: 0;
}

.mood-pip {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.pip-peaceful  { background: #7a9e7e; }
.pip-grateful  { background: #b9a9cc; }
.pip-heavy     { background: #8a7a6a; }
.pip-uncertain { background: #9a9ab2; }
.pip-alive     { background: #c4a24a; }

.h-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.07em;
  white-space: nowrap;
}

.h-mood-label {
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.h-chevron {
  color: var(--muted);
  font-size: 0.65rem;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.h-entry.open .h-chevron { transform: rotate(180deg); }

.h-body {
  display: none;
  padding: 0 1.25rem 1.25rem;
}
.h-entry.open .h-body { display: block; }

.h-content {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  line-height: 1.75;
  color: rgba(232,224,208,0.72);
  white-space: pre-wrap;
  margin-bottom: 1rem;
}

.h-insights {
  border-left: 2px solid var(--border2);
  padding-left: 1rem;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.95rem;
  line-height: 1.75;
  color: var(--lav);
  white-space: pre-wrap;
}

.h-empty {
  padding: 3rem;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--muted);
  border: 1px solid var(--border);
  font-size: 1rem;
}

/* ── Tools row ── */
.tools-row {
  display: flex;
  gap: 0.75rem;
  margin-top: 1.75rem;
  flex-wrap: wrap;
}

/* ── Weekly insights response ── */
.weekly-wrap {
  display: none;
  margin-top: 1.5rem;
  border: 1px solid var(--border2);
  background: rgba(185,169,204,0.025);
  padding: 1.5rem;
  animation: fadeIn 0.4s ease;
}
.weekly-wrap.visible { display: block; }

.weekly-label {
  font-size: 0.57rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--lav);
  margin-bottom: 1.25rem;
}

.weekly-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.08rem;
  line-height: 1.9;
  color: var(--cream);
  white-space: pre-wrap;
}

/* ── Settings modal ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(11,20,18,0.88);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 2rem;
  width: 100%;
  max-width: 400px;
  animation: fadeIn 0.2s ease;
}

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 300;
  letter-spacing: 0.04em;
  margin-bottom: 1.25rem;
  color: var(--cream);
}

.modal-label {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 0.5rem;
}

.modal-input-wrap {
  display: flex;
  border: 1px solid var(--border);
  margin-bottom: 1rem;
}

.modal-input-wrap input {
  flex: 1;
  background: none;
  border: none;
  color: var(--cream);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  padding: 0.65rem 0.9rem;
  outline: none;
}

.modal-input-wrap button {
  background: none;
  border: none;
  border-left: 1px solid var(--border);
  color: var(--muted);
  padding: 0 0.75rem;
  cursor: pointer;
  font-size: 0.75rem;
  transition: color 0.2s;
}
.modal-input-wrap button:hover { color: var(--cream); }

.modal-save {
  background: var(--sage);
  border: none;
  color: var(--bg2);
  font-family: 'Inter', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0.65rem 1.5rem;
  cursor: pointer;
  transition: background 0.2s;
}
.modal-save:hover { background: #8db492; }

.modal-status {
  font-size: 0.7rem;
  color: var(--sage);
  margin-top: 0.6rem;
  min-height: 1em;
  font-family: 'JetBrains Mono', monospace;
}

.modal-close {
  float: right;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 1.1rem;
  cursor: pointer;
  line-height: 1;
  margin-top: -0.2rem;
}
.modal-close:hover { color: var(--cream); }

/* ── Saved toast ── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--sage);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  padding: 0.55rem 1.2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 200;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Print styles ── */
@media print {
  body { background: #fff; color: #1a1a1a; }
  body::before { display: none; }
  .page { max-width: 100%; padding: 0; }
  header, .mood-section, .journal-section, .actions,
  .response-area, .tools-row, .modal-backdrop,
  .toast, .settings-btn { display: none !important; }
  .divider { border-color: #ccc; }
  .history-title { color: #1a1a1a; font-size: 1.4rem; }
  .h-entry { background: #fff; border-bottom: 1px solid #ddd; }
  .h-entry-head { padding: 0.75rem 0; }
  .h-date, .h-mood-label { color: #666; }
  .h-body { display: block !important; padding: 0 0 1rem; }
  .h-content { color: #333; }
  .h-insights { color: #555; border-left-color: #ccc; }
  .h-chevron { display: none; }
  .history-list { background: #ddd; }
  .weekly-wrap, .weekly-label, .weekly-text { display: none !important; }
  .print-header {
    display: block !important;
    font-family: Georgia, serif;
    font-size: 1.8rem;
    margin-bottom: 2rem;
    border-bottom: 2px solid #ccc;
    padding-bottom: 0.75rem;
    color: #1a1a1a;
  }
}

.print-header { display: none; }

/* ── Responsive ── */
@media (max-width: 560px) {
  .mood-btn { min-width: 70px; padding: 0.8rem 0.5rem; }
  .actions { flex-direction: column; }
  .btn-primary, .btn-secondary { text-align: center; }
  .tools-row { flex-direction: column; }
}
</style>
</head>
<body>

<div class="page">

  <!-- Settings modal -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="handleBackdropClick(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div class="modal-title">API Key</div>
      <label class="modal-label">Anthropic API Key</label>
      <div class="modal-input-wrap">
        <input type="password" id="apiKeyInput" placeholder="sk-ant-…" />
        <button onclick="toggleKeyVis()" id="eyeBtn">show</button>
      </div>
      <button class="modal-save" onclick="saveKey()">Save</button>
      <div class="modal-status" id="modalStatus"></div>
    </div>
  </div>

  <!-- Print header (print only) -->
  <div class="print-header">Beings Journal</div>

  <!-- Header -->
  <header>
    <div class="wordmark">
      <a href="command-center.html" class="wordmark-beings">Beings</a>
      <span class="wordmark-journal">Journal</span>
      <span class="pro-badge">PRO</span>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <div id="rank-badge-mount"></div>
      <button class="settings-btn" onclick="openModal()" title="API Key settings">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.6 2.6l1.1 1.1M11.3 11.3l1.1 1.1M11.3 3.7l-1.1 1.1M3.8 11.2l-1.1 1.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>
    </div>
  </header>

  <!-- Date -->
  <div class="date-line" id="dateLine"></div>

  <!-- Mood picker -->
  <span class="section-label">How are you arriving today?</span>
  <div class="mood-grid">
    <button class="mood-btn" data-mood="peaceful" onclick="selectMood('peaceful')">
      <svg class="mood-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
        <!-- Wave for peaceful -->
        <path d="M4 14 Q7 10 10 14 Q13 18 16 14 Q19 10 22 14 Q24 16 25 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
      peaceful
    </button>
    <button class="mood-btn" data-mood="grateful" onclick="selectMood('grateful')">
      <svg class="mood-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
        <!-- Heart for grateful -->
        <path d="M14 20.5C14 20.5 5.5 15 5.5 9.5C5.5 7 7.5 5.5 9.5 5.5C11.2 5.5 12.8 6.5 14 8C15.2 6.5 16.8 5.5 18.5 5.5C20.5 5.5 22.5 7 22.5 9.5C22.5 15 14 20.5 14 20.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      grateful
    </button>
    <button class="mood-btn" data-mood="heavy" onclick="selectMood('heavy')">
      <svg class="mood-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
        <!-- Cloud with weight for heavy -->
        <path d="M8 17C5.8 17 4 15.2 4 13C4 11 5.5 9.3 7.5 9C8.2 7.2 9.9 6 12 6C14.5 6 16.5 7.8 16.8 10C18.6 10.2 20 11.7 20 13.5C20 15.4 18.4 17 16.5 17H8Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        <path d="M10 20 L10 22M14 20 L14 22M18 20L18 22" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      heavy
    </button>
    <button class="mood-btn" data-mood="uncertain" onclick="selectMood('uncertain')">
      <svg class="mood-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
        <!-- Question mark for uncertain -->
        <path d="M11 10.5C11 8.6 12.3 7.5 14 7.5C15.7 7.5 17 8.7 17 10.3C17 11.6 16.2 12.5 15 13.2C14.3 13.6 14 14.1 14 14.8V15.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="14" cy="19" r="1" fill="currentColor"/>
      </svg>
      uncertain
    </button>
    <button class="mood-btn" data-mood="alive" onclick="selectMood('alive')">
      <svg class="mood-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
        <!-- Spark/sun for alive -->
        <circle cx="14" cy="14" r="3.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M14 5.5V7.5M14 20.5V22.5M5.5 14H7.5M20.5 14H22.5M8.1 8.1L9.5 9.5M18.5 18.5L19.9 19.9M19.9 8.1L18.5 9.5M9.5 18.5L8.1 19.9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      alive
    </button>
  </div>

  <!-- Journal canvas -->
  <span class="section-label">What's here for you today?</span>
  <div class="journal-section">
    <textarea id="entry" placeholder="This space is yours. Nothing to perform, nothing to fix. Just write what's true right now…" oninput="updateWordCount()"></textarea>
    <div class="word-count"><span id="wordCount">0</span> words</div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn-primary" id="reflectBtn" onclick="reflect()">Reflect with Claude</button>
    <button class="btn-secondary" onclick="saveEntry(false)">Save quietly</button>
    <button class="btn-secondary" onclick="clearCanvas()">Clear</button>
  </div>
  <p style="font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;margin-top:-1rem;margin-bottom:2rem;">🔒 Your words stay with you — saved locally, never shared.</p>

  <!-- Claude response -->
  <div class="response-area" id="responseArea">
    <div class="response-label">Beings reflects</div>
    <div class="response-text" id="responseText"></div>
    <div class="follow-up-wrap" id="followUpWrap">
      <div class="follow-up-label">A question to sit with</div>
      <div class="follow-up-text" id="followUpText"></div>
    </div>
  </div>

  <hr class="divider">

  <!-- History -->
  <div class="history-top">
    <span class="history-title">Your entries</span>
    <span class="history-count" id="historyCount"></span>
  </div>
  <div id="historyArea"></div>

  <!-- Tools -->
  <div class="tools-row">
    <button class="btn-secondary lav" onclick="weeklyInsights()">✦ Weekly Insights</button>
    <button class="btn-secondary" onclick="exportPDF()">↓ Export PDF</button>
  </div>

  <!-- Weekly response -->
  <div class="weekly-wrap" id="weeklyWrap">
    <div class="weekly-label">Patterns across your week</div>
    <div class="weekly-text" id="weeklyText"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════
const LS_ENTRIES = 'beings_journal_v1';
const LS_KEY     = 'beings_key';
const API_URL    = 'https://api.anthropic.com/v1/messages';
const MODEL      = 'claude-sonnet-4-6';

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let selectedMood = null;

// ═══════════════════════════════════
// STORAGE
// ═══════════════════════════════════
function loadEntries() {
  try { return JSON.parse(localStorage.getItem(LS_ENTRIES) || '[]'); } catch { return []; }
}

function saveEntries(entries) {
  try { localStorage.setItem(LS_ENTRIES, JSON.stringify(entries)); } catch {}
}

function getApiKey() {
  return localStorage.getItem(LS_KEY) || '';
}

// ═══════════════════════════════════
// DATE
// ═══════════════════════════════════
function renderDate() {
  const d = new Date();
  const days  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateLine').textContent =
    `${days[d.getDay()]} · ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtDate(iso) {
  const d = new Date(iso);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

// ═══════════════════════════════════
// MOOD
// ═══════════════════════════════════
function selectMood(mood) {
  selectedMood = mood;
  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.mood === mood);
  });
}

// ═══════════════════════════════════
// WORD COUNT
// ═══════════════════════════════════
function updateWordCount() {
  const text = document.getElementById('entry').value.trim();
  const count = text ? text.split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = count;
}

// ═══════════════════════════════════
// API CALL
// ═══════════════════════════════════
async function callClaude(prompt) {
  const key = getApiKey();
  if (!key) {
    showToast('Add your API key via the settings icon');
    throw new Error('No API key');
  }
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-calls': 'true',
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 800,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

// ═══════════════════════════════════
// REFLECT
// ═══════════════════════════════════
async function reflect() {
  const content = document.getElementById('entry').value.trim();
  if (!content) { showToast('Write something first'); return; }

  const btn = document.getElementById('reflectBtn');
  btn.disabled = true;
  btn.textContent = 'Reflecting…';

  const area     = document.getElementById('responseArea');
  const respText = document.getElementById('responseText');
  const fuWrap   = document.getElementById('followUpWrap');
  const fuText   = document.getElementById('followUpText');

  area.classList.add('visible');
  fuWrap.classList.remove('visible');
  respText.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

  const moodLine = selectedMood ? `Mood: ${selectedMood}` : '';

  const prompt = `You are a gentle, wise presence within Beings — a journaling app rooted in the belief that every person is already whole. Someone has just finished writing a journal entry. Read it with care and offer exactly 3 warm, grounded insights. Do not give advice. Do not try to fix anything. Instead, reflect what you notice with tenderness — affirm their wholeness, name what you see, invite curiosity. Speak in second person. Keep each insight 2–3 sentences.

After the insights, write one deeper question on its own line, preceded by a tilde (~). The question should invite them to go further, not solve anything.

${moodLine}

Their entry:
${content}

Format exactly as:
[First insight]

[Second insight]

[Third insight]

~ [One question]`;

  try {
    const response = await callClaude(prompt);

    // Split follow-up question from insights
    const tildeIdx = response.lastIndexOf('\n~');
    let insights = response;
    let question = '';

    if (tildeIdx !== -1) {
      insights = response.slice(0, tildeIdx).trim();
      question  = response.slice(tildeIdx).replace(/^\s*~\s*/, '').trim();
    }

    respText.textContent = insights;

    if (question) {
      fuText.textContent = question;
      fuWrap.classList.add('visible');
    }

    // Auto-save entry with insights
    saveEntry(true, insights, question);

  } catch (e) {
    respText.textContent = e.message.includes('API key') ? '' : `Something went quiet. ${e.message}`;
    if (e.message.includes('API key')) area.classList.remove('visible');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Reflect with Claude';
  }
}

// ═══════════════════════════════════
// SAVE ENTRY
// ═══════════════════════════════════
function saveEntry(withInsights = false, insights = '', followUp = '') {
  const content = document.getElementById('entry').value.trim();
  if (!content) { if (!withInsights) showToast('Nothing to save'); return; }

  const entries = loadEntries();
  const id = Date.now().toString();

  entries.unshift({
    id,
    date:     new Date().toISOString(),
    dateKey:  todayKey(),
    mood:     selectedMood,
    content,
    insights: insights || null,
    followUp: followUp || null,
  });

  // Keep max 365 entries
  if (entries.length > 365) entries.length = 365;
  saveEntries(entries);

  if (!withInsights) {
    showToast('Entry saved');
    clearCanvas();
  }

  renderHistory();
}

function clearCanvas() {
  document.getElementById('entry').value = '';
  updateWordCount();
  document.getElementById('responseArea').classList.remove('visible');
  document.getElementById('followUpWrap').classList.remove('visible');
  selectedMood = null;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
}

// ═══════════════════════════════════
// HISTORY
// ═══════════════════════════════════
function renderHistory() {
  const entries = loadEntries();
  const area    = document.getElementById('historyArea');
  const counter = document.getElementById('historyCount');

  counter.textContent = entries.length === 1 ? '1 entry' : `${entries.length} entries`;

  if (!entries.length) {
    area.innerHTML = '<div class="h-empty">Your entries will appear here.</div>';
    return;
  }

  area.innerHTML = '<div class="history-list">' +
    entries.map((e, i) => {
      const preview = e.content.length > 180
        ? e.content.slice(0, 180).trimEnd() + '…'
        : e.content;
      const moodPip = e.mood ? `<span class="mood-pip pip-${e.mood}"></span>` : '';
      const moodLbl = e.mood ? `<span class="h-mood-label">${e.mood}</span>` : '';
      const insightsHtml = e.insights
        ? `<div class="h-insights">${escHtml(e.insights)}</div>`
        : '';
      return `
<div class="h-entry" id="hentry-${i}" onclick="toggleEntry(${i})">
  <div class="h-entry-head">
    <div class="h-entry-left">
      ${moodPip}
      <span class="h-date">${fmtDate(e.date)}</span>
      ${moodLbl}
    </div>
    <span class="h-chevron">▾</span>
  </div>
  <div class="h-body">
    <div class="h-content">${escHtml(preview)}</div>
    ${insightsHtml}
  </div>
</div>`;
    }).join('') +
  '</div>';
}

function toggleEntry(i) {
  const el = document.getElementById(`hentry-${i}`);
  if (el) el.classList.toggle('open');
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ═══════════════════════════════════
// WEEKLY INSIGHTS
// ═══════════════════════════════════
async function weeklyInsights() {
  const entries = loadEntries();
  const cutoff  = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const recent  = entries.filter(e => new Date(e.date).getTime() >= cutoff);

  if (!recent.length) { showToast('No entries from the last 7 days'); return; }
  if (window.BeingsRanks) { BeingsRanks.recordInsightView(); BeingsRanks.init('rank-badge-mount'); }

  const wrap = document.getElementById('weeklyWrap');
  const text = document.getElementById('weeklyText');
  wrap.classList.add('visible');
  text.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

  const formatted = recent.map((e, i) =>
    `Entry ${i + 1} — ${fmtDate(e.date)}${e.mood ? ` (${e.mood})` : ''}:\n${e.content}`
  ).join('\n\n---\n\n');

  const prompt = `You are a gentle, wise presence within Beings. Someone has shared their last 7 days of journal entries. Read them with care and offer a warm, honest pattern analysis. Notice recurring themes, emotional textures, quiet moments of courage or growth. Then offer one gentle invitation for the week ahead — not a task, but an orientation toward something.

Speak with depth and warmth. Affirm their wholeness. Do not give advice.

Entries:
${formatted}

Format your response as:

Themes this week
[2–3 sentences on what you notice recurring]

Moments of note
[2–3 sentences on something meaningful you see]

A gentle invitation
[1–2 sentences offering a soft direction for the week ahead]`;

  try {
    const response = await callClaude(prompt);
    // Lightly render bold headers
    text.innerHTML = response
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^([A-Z][^\n]+)\n/gm, '<span style="font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--lav);display:block;margin-bottom:0.5rem;margin-top:1.25rem">$1</span>');
  } catch (e) {
    text.textContent = e.message;
  }
}

// ═══════════════════════════════════
// EXPORT PDF
// ═══════════════════════════════════
function exportPDF() {
  // Expand all entries for print
  document.querySelectorAll('.h-entry').forEach(el => el.classList.add('open'));
  window.print();
  // Collapse again after a tick
  setTimeout(() => {
    document.querySelectorAll('.h-entry').forEach(el => el.classList.remove('open'));
  }, 1000);
}

// ═══════════════════════════════════
// MODAL (API KEY)
// ═══════════════════════════════════
function openModal() {
  const key = getApiKey();
  const input = document.getElementById('apiKeyInput');
  input.value = key;
  input.type  = 'password';
  document.getElementById('eyeBtn').textContent = 'show';
  document.getElementById('modalStatus').textContent = '';
  document.getElementById('modalBackdrop').classList.add('open');
  setTimeout(() => input.focus(), 50);
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
}

function toggleKeyVis() {
  const input = document.getElementById('apiKeyInput');
  const btn   = document.getElementById('eyeBtn');
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  btn.textContent = show ? 'hide' : 'show';
}

function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (val) localStorage.setItem(LS_KEY, val);
  else localStorage.removeItem(LS_KEY);
  document.getElementById('modalStatus').textContent = val ? 'Saved.' : 'Cleared.';
  setTimeout(closeModal, 900);
}

document.getElementById('apiKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter')  saveKey();
  if (e.key === 'Escape') closeModal();
});

// ═══════════════════════════════════
// TOAST
// ═══════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
renderDate();
renderHistory();
</script>
<script src="ranks.js"></script>
<script>BeingsRanks.init('rank-badge-mount');</script>
</body>
</html>
