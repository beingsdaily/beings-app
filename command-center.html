<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beings — Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Night mode (default) ── */
    :root {
      --bg:          #0d1610;
      --bg-card:     #111b12;
      --bg-raised:   #162018;
      --bg-input:    #141e15;
      --border:      rgba(122,158,126,0.13);
      --border-md:   rgba(122,158,126,0.28);
      --border-lav:  rgba(185,169,204,0.15);
      --sage:        #7a9e7e;
      --sage-dim:    #4e6b52;
      --sage-bright: #90b894;
      --sage-glow:   rgba(122,158,126,0.12);
      --lavender:    #b9a9cc;
      --lav-dim:     rgba(185,169,204,0.45);
      --cream:       #e6dece;
      --cream-dim:   #8a8278;
      --cream-faint: rgba(230,222,206,0.06);
      --noise-opacity: 0.025;
      --glow-color:  rgba(122,158,126,0.06);
    }

    /* ── Day mode ── */
    body.day-mode {
      --bg:          #f5f0e8;
      --bg-card:     #faf7f2;
      --bg-raised:   #f0ebe0;
      --bg-input:    #ede8de;
      --border:      rgba(90,130,95,0.18);
      --border-md:   rgba(90,130,95,0.38);
      --border-lav:  rgba(140,120,170,0.2);
      --sage:        #5a7a5e;
      --sage-dim:    #7a9e7e;
      --sage-bright: #3d6642;
      --sage-glow:   rgba(90,130,95,0.1);
      --lavender:    #7b6a96;
      --lav-dim:     rgba(123,106,150,0.55);
      --cream:       #2c2820;
      --cream-dim:   #6b6258;
      --cream-faint: rgba(44,40,32,0.05);
      --noise-opacity: 0.018;
      --glow-color:  rgba(180,210,160,0.18);
    }

    body.day-mode::after {
      background: radial-gradient(ellipse, var(--glow-color) 0%, transparent 65%);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: var(--noise-opacity);
      pointer-events: none;
    }

    /* ─── Mode toggle ────────────────────────────── */
    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 7px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .mode-toggle:hover { border-color: var(--border-md); color: var(--cream); }

    body { transition: background 0.4s ease, color 0.3s ease; }

    body::after {
      content: '';
      position: fixed;
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(122,158,126,0.06) 0%, transparent 65%);
      top: -150px; left: 50%; transform: translateX(-50%);
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ─── Header ─────────────────────────────────── */
    header {
      padding: 44px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 44px;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--sage-dim);
      text-decoration: none;
    }

    .date-block { text-align: right; }

    .date-full {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sage);
    }

    .greeting {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--cream);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    /* ─── Priority ──────────────────────────────── */
    .priority-wrap {
      margin-bottom: 44px;
    }

    .section-label {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--sage-dim);
      margin-bottom: 14px;
      font-weight: 400;
    }

    .priority-field {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      transition: border-color 0.2s;
    }

    .priority-field:focus-within { border-color: var(--border-md); }

    .priority-marker {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sage);
      flex-shrink: 0;
      box-shadow: 0 0 8px rgba(122,158,126,0.5);
    }

    .priority-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 0.01em;
    }

    .priority-input::placeholder {
      color: var(--cream-dim);
      opacity: 0.4;
      font-style: italic;
    }

    .priority-save {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sage-dim);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .priority-save:hover { border-color: var(--sage); color: var(--sage); }

    /* ─── Grid layout ───────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .grid-wide {
      grid-template-columns: 1fr;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ─── Card ───────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .card-label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sage-dim);
      margin-bottom: 20px;
      font-weight: 400;
    }

    /* ─── Habits ─────────────────────────────────── */
    .habit-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }

    .habit-row:last-child { border-bottom: none; padding-bottom: 0; }
    .habit-row:first-child { padding-top: 0; }

    .habit-circle {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--sage-dim);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
      position: relative; overflow: hidden;
    }

    .habit-circle::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50%;
      background: var(--sage);
      transform: scale(0);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .habit-row.done .habit-circle {
      border-color: var(--sage);
      transform: scale(1.08);
    }

    .habit-row.done .habit-circle::before { transform: scale(1); }

    .check-svg {
      position: relative; z-index: 1;
      opacity: 0;
      transform: scale(0.4);
      transition: opacity 0.2s 0.08s, transform 0.22s 0.08s cubic-bezier(0.34,1.56,0.64,1);
    }

    .habit-row.done .check-svg { opacity: 1; transform: scale(1); }

    .habit-name {
      flex: 1;
      font-size: 0.88rem;
      color: var(--cream-dim);
      transition: color 0.2s;
    }

    .habit-row.done .habit-name { color: var(--sage-bright); }

    .habit-streak {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--lav-dim);
    }

    /* ─── Quick links ───────────────────────────── */
    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .app-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .app-link:hover {
      border-color: var(--border-md);
      background: rgba(122,158,126,0.07);
    }

    .app-link-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--sage-dim);
      flex-shrink: 0;
    }

    .app-link-name {
      flex: 1;
      font-size: 0.82rem;
      color: var(--cream-dim);
      letter-spacing: 0.03em;
    }

    .app-link-arrow {
      font-size: 0.7rem;
      color: var(--sage-dim);
      opacity: 0.6;
    }

    /* ─── Calendar / Events ─────────────────────── */
    .events-list {
      margin-bottom: 16px;
      min-height: 32px;
    }

    .event-item {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }

    .event-item:last-child { border-bottom: none; }

    .event-time {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--lavender);
      flex-shrink: 0;
      min-width: 44px;
    }

    .event-title {
      font-size: 0.88rem;
      color: var(--cream-dim);
    }

    .event-del {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--sage-dim);
      cursor: pointer;
      font-size: 0.7rem;
      opacity: 0;
      transition: opacity 0.2s;
      padding: 0 4px;
    }

    .event-item:hover .event-del { opacity: 0.7; }

    .event-empty {
      font-size: 0.8rem;
      color: var(--cream-dim);
      opacity: 0.35;
      padding: 8px 0;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }

    .add-event-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .input-sm {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-sm:focus { border-color: var(--border-md); }
    .input-sm::placeholder { color: var(--cream-dim); opacity: 0.4; }

    .input-time { width: 78px; }
    .input-title { flex: 1; }

    .btn-add {
      background: var(--sage-glow);
      border: 1px solid var(--border-md);
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sage);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover { background: rgba(122,158,126,0.2); border-color: var(--sage); }

    /* ─── Quick capture ─────────────────────────── */
    .capture-card { }

    textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 0.86rem;
      font-weight: 300;
      color: var(--cream);
      line-height: 1.65;
      resize: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.02em;
      display: block;
    }

    textarea:focus {
      border-color: var(--border-md);
      box-shadow: 0 0 0 3px rgba(122,158,126,0.06);
    }

    textarea::placeholder { color: var(--cream-dim); opacity: 0.35; }

    .save-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .btn-soft {
      background: transparent;
      border: 1px solid var(--border-md);
      border-radius: 8px;
      padding: 8px 20px;
      font-family: 'Jost', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sage);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-soft:hover { background: var(--sage-glow); border-color: var(--sage); }

    /* ─── Brain Dump ─────────────────────────────── */
    .brain-card { }

    .brain-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .brain-count {
      font-size: 0.68rem;
      color: var(--lav-dim);
      letter-spacing: 0.1em;
    }

    .dump-input-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .dump-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .dump-input:focus { border-color: var(--border-md); }
    .dump-input::placeholder { color: var(--cream-dim); opacity: 0.35; }

    .dump-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .dump-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.25s ease forwards;
    }

    .dump-item:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .dump-bullet {
      color: var(--sage-dim);
      font-size: 0.7rem;
      margin-top: 3px;
      flex-shrink: 0;
    }

    .dump-text {
      flex: 1;
      font-size: 0.86rem;
      color: var(--cream-dim);
      line-height: 1.55;
    }

    .dump-del {
      background: none;
      border: none;
      color: var(--sage-dim);
      cursor: pointer;
      font-size: 0.7rem;
      opacity: 0;
      transition: opacity 0.2s;
      padding: 0 2px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .dump-item:hover .dump-del { opacity: 0.6; }

    .clear-dump {
      background: none;
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sage-dim);
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      padding: 0;
    }

    .clear-dump:hover { opacity: 1; }

    /* ─── Reflection card ───────────────────────── */
    .reflection-card { }

    .rc-question {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.25rem;
      color: var(--cream);
      line-height: 1.45;
      margin-bottom: 20px;
      letter-spacing: 0.01em;
    }

    .rc-api-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .rc-key-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    .rc-key-input:focus { border-color: var(--border-md); }
    .rc-key-input::placeholder { color: var(--cream-dim); opacity: 0.4; }

    .rc-response {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      opacity: 0;
      transition: opacity 0.7s ease;
    }

    .rc-response.visible { opacity: 1; }

    .rc-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .rc-divider::before, .rc-divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    .rc-divider-mark {
      color: var(--lavender);
      font-size: 0.8rem;
      opacity: 0.6;
    }

    .rc-response-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.75;
      color: var(--cream);
    }

    .rc-done-note {
      margin-top: 12px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--sage-dim);
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }

    .rc-err {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #c07070;
      min-height: 16px;
    }

    /* ─── Thoughts list ──────────────────────────── */
    .thought-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .thought-item:last-child { border-bottom: none; }

    .thought-meta {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sage-dim);
      margin-bottom: 4px;
    }

    .thought-text {
      font-size: 0.86rem;
      color: var(--cream-dim);
      line-height: 1.6;
    }

    /* ─── Toast ──────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: var(--bg-card);
      border: 1px solid var(--border-md);
      border-radius: 40px;
      padding: 9px 22px;
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      color: var(--sage);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── Fade in ────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade { opacity: 0; animation: fadeUp 0.6s ease forwards; }
    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.12s; }
    .d3 { animation-delay: 0.2s; }
    .d4 { animation-delay: 0.28s; }
    .d5 { animation-delay: 0.36s; }
    .d6 { animation-delay: 0.44s; }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header class="fade d1">
    <div class="header-top">
      <a href="index.html" class="wordmark">Beings</a>
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mode-toggle" id="mode-toggle" onclick="toggleMode()">
          <span id="mode-icon">☀️</span>
          <span id="mode-label">Day</span>
        </button>
        <div class="date-block">
          <div class="date-full" id="date-full"></div>
        </div>
      </div>
    </div>
    <div class="greeting" id="greeting"></div>
  </header>

  <!-- Priority -->
  <section class="priority-wrap fade d2">
    <div class="section-label">🎯 What's the ONE thing that matters most today?</div>
    <div class="priority-field">
      <div class="priority-marker"></div>
      <input class="priority-input" id="priority-input"
             type="text" placeholder="Name it and let everything else breathe…"
             maxlength="120" />
      <button class="priority-save" onclick="savePriority()">Set</button>
    </div>
  </section>

  <!-- Row 1: Habits + Quick Links -->
  <div class="grid fade d3">

    <!-- Habits -->
    <div class="card">
      <div class="card-label">✅ Today's Habits</div>
      <div id="habits-list"></div>
    </div>

    <!-- Quick Links -->
    <div class="card">
      <div class="card-label">🔗 Beings Apps</div>
      <div class="links-grid">
        <a href="index.html" class="app-link">
          <div class="app-link-dot"></div>
          <span class="app-link-name">Beings</span>
          <span class="app-link-arrow">→</span>
        </a>
        <a href="beings-voice.html" class="app-link">
          <div class="app-link-dot"></div>
          <span class="app-link-name">Beings Voice</span>
          <span class="app-link-arrow">→</span>
        </a>
        <a href="autopilot.html" class="app-link">
          <div class="app-link-dot"></div>
          <span class="app-link-name">Autopilot</span>
          <span class="app-link-arrow">→</span>
        </a>
        <a href="niche-listener.html" class="app-link">
          <div class="app-link-dot"></div>
          <span class="app-link-name">Niche Listener</span>
          <span class="app-link-arrow">→</span>
        </a>
        <a href="tracker.html" class="app-link">
          <div class="app-link-dot"></div>
          <span class="app-link-name">Habit Tracker</span>
          <span class="app-link-arrow">→</span>
        </a>
        <a href="landing.html" class="app-link">
          <div class="app-link-dot"></div>
          <span class="app-link-name">Landing Page</span>
          <span class="app-link-arrow">→</span>
        </a>
      </div>
    </div>

  </div>

  <!-- Row 2: Calendar + Quick Capture -->
  <div class="grid fade d4">

    <!-- Calendar -->
    <div class="card">
      <div class="card-label">📅 Today's Schedule</div>
      <div class="events-list" id="events-list"></div>
      <div class="add-event-row">
        <input class="input-sm input-time" id="event-time" type="text" placeholder="9:00" maxlength="8" />
        <input class="input-sm input-title" id="event-title" type="text" placeholder="Add event…" maxlength="80" />
        <button class="btn-add" onclick="addEvent()">Add</button>
      </div>
    </div>

    <!-- Quick Capture -->
    <div class="card capture-card">
      <div class="card-label">💭 Capture a Thought</div>
      <textarea id="thought-input" rows="4" placeholder="What's present for you right now…"></textarea>
      <div class="save-row">
        <button class="btn-soft" onclick="saveThought()">Save thought</button>
      </div>
      <div id="thoughts-list" style="margin-top:14px;"></div>
    </div>

  </div>

  <!-- Daily Reflection - full width -->
  <div class="card reflection-card fade d5" style="margin-bottom:20px;" id="rc-card">
    <div class="card-label">🌿 Daily Reflection</div>
    <div class="rc-question" id="rc-question"></div>

    <!-- API key row — hidden once key is saved -->
    <div class="rc-api-row" id="rc-api-row" style="display:none;">
      <input class="rc-key-input" id="rc-key-input" type="password"
             placeholder="Anthropic API key (sk-ant-…)" autocomplete="off" />
      <button class="btn-soft" onclick="rcSaveKey()">Save key</button>
    </div>

    <textarea id="rc-input" rows="4"
              placeholder="Write as little or as much as feels true…"></textarea>
    <div class="save-row">
      <button class="btn-soft" id="rc-btn" onclick="rcReflect()">Reflect →</button>
    </div>
    <p class="rc-err" id="rc-err"></p>

    <div class="rc-response" id="rc-response">
      <div class="rc-divider"><span class="rc-divider-mark">✦</span></div>
      <div class="rc-response-text" id="rc-response-text"></div>
    </div>
  </div>

  <!-- Brain Dump - full width -->
  <div class="card brain-card fade d6" style="margin-bottom:20px;">
    <div class="brain-header">
      <div class="card-label" style="margin-bottom:0;">🧠 Brain Dump</div>
      <div style="display:flex;align-items:center;gap:16px;">
        <span class="brain-count" id="dump-count"></span>
        <button class="clear-dump" onclick="clearDump()">Clear all</button>
      </div>
    </div>
    <div class="dump-input-wrap">
      <input class="dump-input" id="dump-input" type="text"
             placeholder="Type a thought and press Enter — no judgment…" />
    </div>
    <div class="dump-list" id="dump-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── Keys ──────────────────────────────────────────────────
  const HABITS_KEY   = 'beings_habit_data';
  const THOUGHTS_KEY = 'beings_thoughts';
  const PRIORITY_KEY = 'beings_priority';
  const EVENTS_KEY   = 'beings_calendar_events';
  const DUMP_KEY     = 'beings_brain_dump';

  const HABITS = [
    { id: 'reflection', name: 'Daily Reflection' },
    { id: 'xpost',      name: 'X Post'           },
    { id: 'obsidian',   name: 'Obsidian Note'    },
  ];

  // ── Helpers ───────────────────────────────────────────────
  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  function load(key, def) {
    try { return JSON.parse(localStorage.getItem(key)) ?? def; }
    catch { return def; }
  }

  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function calcStreak(habitId) {
    const data = load(HABITS_KEY, {});
    let streak = 0;
    const today = new Date();
    for (let i = 0; i <= 365; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const k = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      if (data[k]?.[habitId]) { streak++; }
      else { if (i === 0) continue; break; }
    }
    return streak;
  }

  // ── Header ────────────────────────────────────────────────
  function renderHeader() {
    const now    = new Date();
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const h      = now.getHours();

    document.getElementById('date-full').textContent =
      `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

    const phrases = h < 12
      ? [ 'Good morning! Ready to show up for yourself today? 🌅',
          'Good morning. The day is still quiet. Make it yours. ☀️',
          'Morning! One breath, one step. You've got this. 🌿' ]
      : h < 17
      ? [ 'Good afternoon. How are you actually doing? 🍃',
          'Hey, good afternoon. Pause for a second — how do you feel? 🌤️',
          'Afternoon check-in. Still breathing. Still whole. ✨' ]
      : [ 'Good evening. You made it through another day. 🌙',
          'Evening. Time to come back to yourself. 🕯️',
          'Good evening. Rest is not laziness — it\'s wisdom. 🌙' ];

    const idx = (now.getDate() + h) % phrases.length;
    document.getElementById('greeting').textContent = phrases[idx];
  }

  // ── Priority ──────────────────────────────────────────────
  function renderPriority() {
    const data  = load(PRIORITY_KEY, {});
    const today = todayKey();
    if (data.date === today && data.text) {
      document.getElementById('priority-input').value = data.text;
    }
  }

  function savePriority() {
    const text = document.getElementById('priority-input').value.trim();
    save(PRIORITY_KEY, { date: todayKey(), text });
    toast('Priority set');
  }

  document.getElementById('priority-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') savePriority();
  });

  // ── Habits ────────────────────────────────────────────────
  function renderHabits() {
    const data    = load(HABITS_KEY, {});
    const today   = todayKey();
    const dayData = data[today] || {};
    const list    = document.getElementById('habits-list');
    list.innerHTML = '';

    HABITS.forEach(h => {
      const done   = !!dayData[h.id];
      const streak = calcStreak(h.id);
      const row    = document.createElement('div');
      row.className = `habit-row${done ? ' done' : ''}`;
      row.setAttribute('role', 'checkbox');
      row.setAttribute('aria-checked', String(done));
      row.setAttribute('tabindex', '0');
      row.innerHTML = `
        <div class="habit-circle">
          <svg class="check-svg" width="11" height="8" viewBox="0 0 11 8" fill="none">
            <path d="M1 4L4 7L10 1" stroke="#0d1610" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="habit-name">${h.name}</span>
        <span class="habit-streak">${streak > 0 ? streak + 'd' : ''}</span>`;

      const toggle = () => {
        const d  = load(HABITS_KEY, {});
        const td = todayKey();
        if (!d[td]) d[td] = {};
        d[td][h.id] = !d[td][h.id];
        save(HABITS_KEY, d);
        renderHabits();
        if (d[td][h.id]) toast(`${h.name} done`);
      };

      row.addEventListener('click', toggle);
      row.addEventListener('keydown', e => {
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); }
      });
      list.appendChild(row);
    });
  }

  // ── Calendar events ───────────────────────────────────────
  function renderEvents() {
    const all   = load(EVENTS_KEY, []);
    const today = todayKey();
    const list  = document.getElementById('events-list');
    const items = all.filter(e => e.date === today)
                     .sort((a,b) => a.time.localeCompare(b.time));

    if (!items.length) {
      list.innerHTML = `<div class="event-empty">Nothing scheduled yet.</div>`;
      return;
    }

    list.innerHTML = items.map((e,i) => `
      <div class="event-item">
        <span class="event-time">${escHtml(e.time)}</span>
        <span class="event-title">${escHtml(e.title)}</span>
        <button class="event-del" onclick="deleteEvent(${i})" title="Remove">✕</button>
      </div>`).join('');
  }

  function addEvent() {
    const time  = document.getElementById('event-time').value.trim();
    const title = document.getElementById('event-title').value.trim();
    if (!title) return;
    const all = load(EVENTS_KEY, []);
    all.push({ date: todayKey(), time: time || '—', title });
    save(EVENTS_KEY, all);
    document.getElementById('event-time').value  = '';
    document.getElementById('event-title').value = '';
    renderEvents();
  }

  function deleteEvent(index) {
    const all   = load(EVENTS_KEY, []);
    const today = todayKey();
    const items = all.filter(e => e.date === today);
    items.splice(index, 1);
    const other = all.filter(e => e.date !== today);
    save(EVENTS_KEY, [...other, ...items]);
    renderEvents();
  }

  document.getElementById('event-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') addEvent();
  });

  // ── Quick capture ─────────────────────────────────────────
  function saveThought() {
    const input = document.getElementById('thought-input');
    const text  = input.value.trim();
    if (!text) return;
    const all = load(THOUGHTS_KEY, []);
    all.unshift({ date: new Date().toISOString(), text });
    save(THOUGHTS_KEY, all.slice(0, 30));
    input.value = '';
    renderThoughts();
    toast('Saved');
  }

  function renderThoughts() {
    const all  = load(THOUGHTS_KEY, []);
    const list = document.getElementById('thoughts-list');
    list.innerHTML = '';
    all.slice(0, 3).forEach(t => {
      const d  = new Date(t.date);
      const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
      const el = document.createElement('div');
      el.className = 'thought-item';
      el.innerHTML = `
        <div class="thought-meta">${mo} ${d.getDate()} · ${pad(d.getHours())}:${pad(d.getMinutes())}</div>
        <div class="thought-text">${escHtml(t.text)}</div>`;
      list.appendChild(el);
    });
  }

  document.getElementById('thought-input').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveThought();
  });

  // ── Brain Dump ────────────────────────────────────────────
  function renderDump() {
    const items = load(DUMP_KEY, []);
    const list  = document.getElementById('dump-list');
    const count = document.getElementById('dump-count');
    count.textContent = items.length ? `${items.length} idea${items.length === 1 ? '' : 's'}` : '';
    list.innerHTML = '';
    items.forEach((text, i) => {
      const el = document.createElement('div');
      el.className = 'dump-item';
      el.innerHTML = `
        <span class="dump-bullet">◦</span>
        <span class="dump-text">${escHtml(text)}</span>
        <button class="dump-del" onclick="deleteDump(${i})" title="Remove">✕</button>`;
      list.appendChild(el);
    });
  }

  function addDump() {
    const input = document.getElementById('dump-input');
    const text  = input.value.trim();
    if (!text) return;
    const items = load(DUMP_KEY, []);
    items.unshift(text);
    save(DUMP_KEY, items.slice(0, 100));
    input.value = '';
    renderDump();
  }

  function deleteDump(i) {
    const items = load(DUMP_KEY, []);
    items.splice(i, 1);
    save(DUMP_KEY, items);
    renderDump();
  }

  function clearDump() {
    if (!load(DUMP_KEY, []).length) return;
    save(DUMP_KEY, []);
    renderDump();
    toast('Brain dump cleared');
  }

  document.getElementById('dump-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addDump();
  });

  // ── Toast ─────────────────────────────────────────────────
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── Init ──────────────────────────────────────────────────
  renderHeader();
  renderPriority();
  renderHabits();
  renderEvents();
  renderThoughts();
  renderDump();
  initReflection();

  // ── Daily Reflection ─────────────────────────────────────
  const RC_QUESTIONS = [
    "What are you carrying today that deserves a little gentleness?",
    "What small moment brought you back to yourself recently?",
    "Where in your body do you feel most at home right now?",
    "What are you learning to accept about yourself?",
    "What does your heart want you to hear today?",
    "What are you not saying that quietly wants to be said?",
    "What feels like enough, right now, in this moment?",
    "What part of yourself have you been hardest on lately?",
    "What are you grateful for that you rarely think to name?",
    "What are you ready to let be exactly as it is?",
    "What would it feel like to trust yourself completely today?",
    "What are you protecting yourself from feeling?",
    "When did you last let yourself be fully seen?",
    "What does rest mean to you right now?",
    "What truth are you circling without quite landing on?",
    "What are you afraid to want?",
    "What would you do today if you knew you were enough?",
    "What part of your story are you still making peace with?",
    "What are you more ready for than you think?",
    "What does your wisest self want you to remember?",
    "What have you been too busy to grieve?",
    "What does love ask of you today?",
    "What are you outgrowing that you haven't named yet?",
    "What would you tell yourself from ten years ago?",
    "What are you holding onto that you could release?",
    "What do you need more of right now?",
    "What are you beginning to understand about yourself?",
    "What brings you home to yourself most quickly?",
    "What is asking for your attention beneath the noise?",
    "What would full presence feel like for you today?",
  ];

  const RC_SYSTEM = `You are a warm, grounded, loving presence — a wise mirror.

The person sharing with you is already whole. Nothing is missing. Nothing needs to be fixed or improved. Hold this as absolute truth.

When they share their reflection, your only role is to witness them with tenderness and reflect back what you genuinely hear — not advice, not reframing, not encouragement to change. Simply presence. Warmth. Recognition.

Speak in 2–4 sentences. Be human and warm, not poetic for its own sake. Let them feel truly seen. Weave in — gently, naturally — the quiet truth that they are already complete.`;

  function rcTodayQuestion() {
    const d   = new Date();
    const idx = (d.getFullYear() * 366 + d.getMonth() * 31 + d.getDate()) % RC_QUESTIONS.length;
    return RC_QUESTIONS[idx];
  }

  function rcStorageKey() {
    return 'beings_response_' + todayKey();
  }

  function initReflection() {
    const question = rcTodayQuestion();
    document.getElementById('rc-question').textContent = question;

    const apiKey = localStorage.getItem('beings_key') || '';
    if (!apiKey) {
      document.getElementById('rc-api-row').style.display = 'flex';
    }

    // Restore today's saved reflection if it exists
    try {
      const saved = localStorage.getItem(rcStorageKey());
      if (saved) {
        const { entry, reflection } = JSON.parse(saved);
        const input = document.getElementById('rc-input');
        input.value      = entry;
        input.disabled   = true;
        const btn = document.getElementById('rc-btn');
        btn.disabled     = true;
        btn.textContent  = 'Reflected ✓';

        const respText = document.getElementById('rc-response-text');
        respText.textContent = reflection;
        document.getElementById('rc-response').classList.add('visible');

        const note = document.createElement('p');
        note.className   = 'rc-done-note';
        note.textContent = 'You've already reflected today. Come back tomorrow.';
        document.getElementById('rc-response').appendChild(note);
      }
    } catch {}
  }

  function rcSaveKey() {
    const val = document.getElementById('rc-key-input').value.trim();
    if (!val.startsWith('sk-ant-')) {
      document.getElementById('rc-err').textContent = 'Key should start with sk-ant-';
      return;
    }
    localStorage.setItem('beings_key', val);
    document.getElementById('rc-api-row').style.display = 'none';
    document.getElementById('rc-err').textContent = '';
    toast('API key saved');
  }

  async function rcReflect() {
    const entry  = document.getElementById('rc-input').value.trim();
    if (!entry) return;

    const apiKey = localStorage.getItem('beings_key') || '';
    if (!apiKey) {
      document.getElementById('rc-api-row').style.display = 'flex';
      document.getElementById('rc-err').textContent = 'Please enter your API key above.';
      return;
    }

    const btn = document.getElementById('rc-btn');
    btn.disabled    = true;
    btn.textContent = '…';
    document.getElementById('rc-err').textContent = '';

    const question    = rcTodayQuestion();
    const userContent = `Today's reflection question: "${question}"\n\nMy response: ${entry}`;

    const respWrap = document.getElementById('rc-response');
    const respText = document.getElementById('rc-response-text');
    respText.textContent = '';
    respWrap.classList.add('visible');
    respWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-6',
          max_tokens: 300,
          stream: true,
          system: RC_SYSTEM,
          messages: [{ role: 'user', content: userContent }],
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let full = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;
          try {
            const json  = JSON.parse(data);
            const delta = json?.delta?.text || '';
            if (delta) {
              full += delta;
              respText.textContent = full;
            }
          } catch {}
        }
      }

      // Save to same localStorage structure as index.html
      localStorage.setItem(rcStorageKey(), JSON.stringify({
        date: new Date().toISOString(),
        question,
        entry,
        reflection: full,
      }));

      document.getElementById('rc-input').disabled = true;
      btn.textContent = 'Reflected ✓';

      const note = document.createElement('p');
      note.className   = 'rc-done-note';
      note.textContent = 'You've already reflected today. Come back tomorrow.';
      respWrap.appendChild(note);

    } catch (err) {
      respWrap.classList.remove('visible');
      btn.disabled    = false;
      btn.textContent = 'Reflect →';
      document.getElementById('rc-err').textContent = err.message || 'Something went wrong. Try again.';
    }
  }

  document.getElementById('rc-input').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') rcReflect();
  });

  document.getElementById('rc-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') rcSaveKey();
  });

  // ── Day / Night mode toggle ───────────────────────────────
  function applyMode(mode) {
    const isDay = mode === 'day';
    document.body.classList.toggle('day-mode', isDay);
    document.getElementById('mode-icon').textContent  = isDay ? '🌙' : '☀️';
    document.getElementById('mode-label').textContent = isDay ? 'Night' : 'Day';
    localStorage.setItem('beings_color_mode', mode);
  }

  function toggleMode() {
    const current = localStorage.getItem('beings_color_mode') || 'night';
    applyMode(current === 'day' ? 'night' : 'day');
  }

  // Restore saved mode on load
  applyMode(localStorage.getItem('beings_color_mode') || 'night');
</script>
