<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beings Autopilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e1410;
      --bg-card:    #131a14;
      --bg-input:   #1a231b;
      --border:     rgba(122,158,126,0.15);
      --border-hover: rgba(122,158,126,0.35);
      --sage:       #7a9e7e;
      --sage-dim:   #4e6b52;
      --sage-bright:#8db492;
      --lavender:   #b9a9cc;
      --cream:      #e8e0d0;
      --cream-dim:  #9a9288;
      --red-dim:    #7a4a4a;
      --red-soft:   rgba(180,80,80,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Noise ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025; pointer-events: none; z-index: 0;
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Header ── */
    header {
      padding: 44px 0 40px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sage);
      text-decoration: none;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      letter-spacing: -0.01em;
      color: var(--cream);
      line-height: 1;
    }

    .page-sub {
      font-size: 0.78rem;
      color: var(--cream-dim);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    /* ── API key ── */
    .api-section {
      margin-bottom: 36px;
    }

    .field-label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sage-dim);
      margin-bottom: 10px;
    }

    .api-row {
      display: flex;
      gap: 10px;
    }

    input[type="password"], input[type="text"] {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--cream);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--border-hover); }
    input::placeholder { color: var(--cream-dim); opacity: 0.4; }

    .btn-save {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sage);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .btn-save:hover { border-color: var(--sage); color: var(--sage-bright); }

    .api-status {
      margin-top: 8px;
      font-size: 0.72rem;
      color: var(--sage-dim);
      letter-spacing: 0.04em;
    }

    /* ── Generate button ── */
    .generate-wrap {
      margin-bottom: 44px;
      text-align: center;
    }

    .btn-generate {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--sage);
      border: none;
      border-radius: 60px;
      padding: 16px 48px;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--bg);
      cursor: pointer;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
    }

    .btn-generate:hover:not(:disabled) {
      background: var(--sage-bright);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(122,158,126,0.22);
    }

    .btn-generate:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(14,20,16,0.3);
      border-top-color: var(--bg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-line {
      margin-top: 14px;
      font-size: 0.76rem;
      color: var(--cream-dim);
      min-height: 18px;
      letter-spacing: 0.03em;
    }

    /* ── Section heading ── */
    .section-heading {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--sage-dim);
      margin-bottom: 20px;
    }

    /* ── Post cards ── */
    #drafts-section { margin-bottom: 56px; }

    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .post-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      transition: border-color 0.2s, opacity 0.3s, transform 0.3s;
      animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-card:nth-child(2) { animation-delay: 0.08s; }
    .post-card:nth-child(3) { animation-delay: 0.16s; }

    .post-card.skipped {
      opacity: 0;
      transform: translateX(20px);
      pointer-events: none;
    }

    .post-card.approved {
      border-color: rgba(122,158,126,0.5);
      background: rgba(122,158,126,0.06);
    }

    .post-text {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--cream);
      margin-bottom: 20px;
      white-space: pre-wrap;
    }

    .char-count {
      font-size: 0.68rem;
      color: var(--cream-dim);
      opacity: 0.5;
      margin-bottom: 16px;
    }

    .char-count.over { color: #c07070; opacity: 1; }

    .card-actions {
      display: flex;
      gap: 10px;
    }

    .btn-approve {
      flex: 1;
      background: rgba(122,158,126,0.12);
      border: 1px solid rgba(122,158,126,0.3);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sage);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-approve:hover {
      background: rgba(122,158,126,0.22);
      border-color: var(--sage);
    }

    .btn-skip {
      background: var(--red-soft);
      border: 1px solid rgba(180,80,80,0.2);
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red-dim);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-skip:hover {
      background: rgba(180,80,80,0.2);
      border-color: rgba(180,80,80,0.4);
    }

    /* ── Queue ── */
    #queue-section { }

    .queue-empty {
      font-size: 0.82rem;
      color: var(--cream-dim);
      opacity: 0.4;
      text-align: center;
      padding: 24px 0;
      letter-spacing: 0.04em;
    }

    .queue-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .queue-item {
      background: var(--bg-card);
      border: 1px solid rgba(185,169,204,0.15);
      border-radius: 12px;
      padding: 20px 20px 20px 24px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      animation: fadeUp 0.3s ease forwards;
    }

    .queue-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--lavender);
      opacity: 0.5;
      flex-shrink: 0;
      line-height: 1.5;
      min-width: 20px;
    }

    .queue-text {
      flex: 1;
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--cream);
    }

    .btn-copy {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream-dim);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .btn-copy:hover { border-color: var(--border-hover); color: var(--cream); }
    .btn-copy.copied { color: var(--sage); border-color: rgba(122,158,126,0.4); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 48px 0 36px;
    }

    /* ── Error toast ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2a1a1a;
      border: 1px solid rgba(180,80,80,0.3);
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 0.8rem;
      color: #d09090;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
      max-width: 420px;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 480px) {
      header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .btn-generate { padding: 14px 32px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div>
      <div class="page-title">Autopilot</div>
      <div class="page-sub">Generate · Review · Queue · Post</div>
    </div>
    <a href="index.html" class="wordmark">Beings</a>
  </header>

  <!-- API Key -->
  <section class="api-section">
    <label class="field-label" for="api-key-input">Anthropic API Key</label>
    <div class="api-row">
      <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
      <button class="btn-save" onclick="saveKey()">Save</button>
    </div>
    <div class="api-status" id="api-status"></div>
  </section>

  <!-- Generate -->
  <div class="generate-wrap">
    <button class="btn-generate" id="gen-btn" onclick="generate()">
      <span class="spinner" id="spinner"></span>
      <span id="gen-label">Generate Today's Posts</span>
    </button>
    <div class="status-line" id="status-line"></div>
  </div>

  <!-- Draft cards -->
  <section id="drafts-section" style="display:none;">
    <div class="section-heading">Review &amp; Approve</div>
    <div class="cards-grid" id="cards-grid"></div>
  </section>

  <hr class="divider" id="queue-divider" style="display:none;" />

  <!-- Queue -->
  <section id="queue-section" style="display:none;">
    <div class="section-heading">Post Queue</div>
    <div class="queue-list" id="queue-list"></div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────
  let queue = JSON.parse(localStorage.getItem('beings_queue') || '[]');
  let drafts = [];

  // ── Init ──────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('beings_api_key');
    if (saved) {
      document.getElementById('api-key-input').value = saved;
      document.getElementById('api-status').textContent = 'Key loaded from storage.';
    }
    renderQueue();
  });

  // ── API Key ───────────────────────────────────────────────
  function saveKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val.startsWith('sk-ant-')) {
      showToast('Key should start with sk-ant-');
      return;
    }
    localStorage.setItem('beings_api_key', val);
    document.getElementById('api-status').textContent = 'Saved.';
  }

  function getKey() {
    return localStorage.getItem('beings_api_key') || document.getElementById('api-key-input').value.trim();
  }

  // ── Anthropic API ─────────────────────────────────────────
  async function callClaude(apiKey) {
    const prompt = `You are the voice of Beings — a daily reflection app rooted in one belief: people are already whole. Nothing is missing.

Your tone is: quiet, warm, grounded, never preachy. You speak like a trusted friend who has done deep inner work. You don't push or motivate — you remind.

Write exactly 3 original X (Twitter) posts for the @BeingsDaily account. Draw from themes of emotional healing, wholeness, self-compassion, presence, and heart-centered living. Each post should feel like something a person might read and quietly exhale.

Rules:
- Each post must be under 280 characters (count carefully)
- Rooted in the belief that the person reading is already whole
- No hashtags, no emojis, no exclamation marks
- No "you should" or "try to" — speak from a place of already knowing
- Each post should feel complete on its own — a small truth, not a call to action
- Vary the style: one reflective, one gentle provocation, one quiet observation

Return ONLY a JSON array with exactly 3 strings, no other text. Example format:
["post one text here","post two text here","post three text here"]`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 512,
        messages: [{ role: 'user', content: prompt }],
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const text = data.content?.[0]?.text?.trim() || '';

    // Parse JSON array from response
    const match = text.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('Could not parse posts from response');
    const posts = JSON.parse(match[0]);
    if (!Array.isArray(posts) || posts.length < 1) throw new Error('Unexpected response format');
    return posts.slice(0, 3);
  }

  // ── Generate ──────────────────────────────────────────────
  async function generate() {
    const apiKey = getKey();
    if (!apiKey || !apiKey.startsWith('sk-ant-')) {
      showToast('Please enter and save your Anthropic API key first.');
      return;
    }

    setLoading(true, 'Asking Claude…');

    try {
      const posts = await callClaude(apiKey);
      setLoading(false);
      renderDrafts(posts);
    } catch (err) {
      setLoading(false);
      setStatus('');
      showToast(err.message || 'Something went wrong. Try again.');
      console.error(err);
    }
  }

  // ── Render draft cards ────────────────────────────────────
  function renderDrafts(posts) {
    drafts = posts;
    const section = document.getElementById('drafts-section');
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';
    section.style.display = 'block';

    posts.forEach((text, i) => {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.id = `card-${i}`;

      const charLen = text.length;
      const overLimit = charLen > 280;

      card.innerHTML = `
        <div class="post-text">${escHtml(text)}</div>
        <div class="char-count ${overLimit ? 'over' : ''}">${charLen} / 280 characters</div>
        <div class="card-actions">
          <button class="btn-approve" data-index="${i}">Approve</button>
          <button class="btn-skip" data-index="${i}">Skip</button>
        </div>`;

      card.querySelector('.btn-approve').addEventListener('click', () => approve(i));
      card.querySelector('.btn-skip').addEventListener('click', () => skip(i));

      grid.appendChild(card);
    });
  }

  function approve(i) {
    const text = drafts[i];
    const card = document.getElementById(`card-${i}`);
    card.classList.add('approved');
    card.querySelector('.card-actions').innerHTML =
      `<span style="font-size:0.75rem;color:var(--sage);letter-spacing:0.1em;">Approved</span>`;

    queue.push(text);
    localStorage.setItem('beings_queue', JSON.stringify(queue));
    renderQueue();

    setTimeout(() => {
      card.style.display = 'none';
      checkDraftsEmpty();
    }, 600);
  }

  function skip(i) {
    const card = document.getElementById(`card-${i}`);
    card.classList.add('skipped');
    setTimeout(() => {
      card.style.display = 'none';
      checkDraftsEmpty();
    }, 350);
  }

  function checkDraftsEmpty() {
    const grid = document.getElementById('cards-grid');
    const visible = [...grid.children].filter(c => c.style.display !== 'none');
    if (!visible.length) {
      document.getElementById('drafts-section').style.display = 'none';
    }
  }

  // ── Render queue ──────────────────────────────────────────
  function renderQueue() {
    const section = document.getElementById('queue-section');
    const divider = document.getElementById('queue-divider');
    const list = document.getElementById('queue-list');

    if (!queue.length) {
      section.style.display = 'none';
      divider.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    divider.style.display = 'block';
    list.innerHTML = '';

    queue.forEach((text, i) => {
      const item = document.createElement('div');
      item.className = 'queue-item';
      item.innerHTML = `
        <span class="queue-num">${i + 1}</span>
        <span class="queue-text">${escHtml(text)}</span>
        <button class="btn-copy" id="copy-${i}" onclick="copyPost(${i})">Copy</button>`;
      list.appendChild(item);
    });
  }

  function copyPost(i) {
    const text = queue[i];
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(`copy-${i}`);
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2200);
    }).catch(() => {
      // Fallback for non-secure contexts
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      const btn = document.getElementById(`copy-${i}`);
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2200);
    });
  }

  // ── Helpers ───────────────────────────────────────────────
  function setLoading(on, msg) {
    const btn = document.getElementById('gen-btn');
    const spinner = document.getElementById('spinner');
    const label = document.getElementById('gen-label');
    btn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
    label.textContent = on ? 'Working…' : 'Generate Today\'s Posts';
    if (msg) setStatus(msg);
    else if (!on) setStatus('');
  }

  function setStatus(msg) {
    document.getElementById('status-line').textContent = msg;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  function escHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
