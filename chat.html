<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #7c6af7;
      --accent-hover: #6a58e5;
      --user-bg: #1e1a3a;
      --assistant-bg: #1a1a1a;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* API Key Setup */
    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 16px;
      padding: 24px;
    }

    #setup h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
    }

    #setup p {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      max-width: 360px;
    }

    #setup-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }

    input[type="password"], input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 12px 20px;
      transition: background 0.15s, opacity 0.15s;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Chat layout */
    #chat { display: none; flex-direction: column; height: 100dvh; }

    header {
      align-items: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: space-between;
      padding: 14px 20px;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; font-weight: 600; }

    #clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 6px 12px;
    }

    #clear-btn:hover { border-color: var(--text-muted); color: var(--text); background: transparent; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #empty-state {
      margin: auto;
      text-align: center;
      color: var(--text-muted);
    }

    #empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    #empty-state p { font-size: 0.9rem; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 760px;
      width: 100%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .label {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0 4px;
    }

    .bubble {
      border-radius: var(--radius);
      line-height: 1.65;
      padding: 12px 16px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.95rem;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid #2e2850;
    }

    .message.assistant .bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
    }

    /* Cursor blink for streaming */
    .cursor::after {
      content: '▋';
      animation: blink 0.7s step-end infinite;
      color: var(--accent);
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Input area */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    #input-wrapper {
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      gap: 8px;
      padding: 8px 8px 8px 14px;
      transition: border-color 0.15s;
    }

    #input-wrapper:focus-within { border-color: var(--accent); }

    #user-input {
      background: transparent;
      border: none;
      color: var(--text);
      flex: 1;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.5;
      max-height: 200px;
      outline: none;
      resize: none;
      padding: 4px 0;
    }

    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      align-items: center;
      border-radius: 8px;
      display: flex;
      flex-shrink: 0;
      height: 36px;
      justify-content: center;
      padding: 0;
      width: 36px;
    }

    #send-btn svg { width: 16px; height: 16px; }

    .hint {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 8px;
      text-align: center;
    }

    /* Error toast */
    #error-toast {
      background: #3a1a1a;
      border: 1px solid #7a2a2a;
      border-radius: 8px;
      bottom: 90px;
      color: #f87171;
      display: none;
      font-size: 0.85rem;
      left: 50%;
      padding: 10px 16px;
      position: fixed;
      transform: translateX(-50%);
      z-index: 100;
    }
  </style>
</head>
<body>

<!-- API Key Setup Screen -->
<div id="setup">
  <div style="font-size: 2rem">✦</div>
  <h1>Claude Chat</h1>
  <p>Enter your Anthropic API key to get started. It stays in memory only — never stored.</p>
  <form id="setup-form">
    <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
    <button type="submit">Start chatting</button>
  </form>
</div>

<!-- Chat Screen -->
<div id="chat">
  <header>
    <h1>✦ Claude Chat</h1>
    <button id="clear-btn">Clear</button>
  </header>

  <div id="messages">
    <div id="empty-state">
      <div class="icon">✦</div>
      <p>Send a message to begin</p>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrapper">
      <textarea id="user-input" placeholder="Message Claude..." rows="1"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 8h12M10 4l4 4-4 4"/>
        </svg>
      </button>
    </div>
    <p class="hint">Enter to send · Shift+Enter for new line</p>
  </div>
</div>

<div id="error-toast"></div>

<script>
  const ANTHROPIC_API = 'https://api.anthropic.com/v1/messages';
  const MODEL = 'claude-opus-4-6';

  let apiKey = '';
  let history = [];
  let isStreaming = false;

  // DOM refs
  const setup = document.getElementById('setup');
  const chat = document.getElementById('chat');
  const setupForm = document.getElementById('setup-form');
  const apiKeyInput = document.getElementById('api-key-input');
  const messages = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn = document.getElementById('clear-btn');
  const errorToast = document.getElementById('error-toast');

  // Setup form
  setupForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const key = apiKeyInput.value.trim();
    if (!key.startsWith('sk-ant-') && !key.startsWith('sk-')) {
      showError('API key should start with "sk-ant-"');
      return;
    }
    apiKey = key;
    setup.style.display = 'none';
    chat.style.display = 'flex';
    userInput.focus();
  });

  // Auto-resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
  });

  // Send on Enter (not Shift+Enter)
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  clearBtn.addEventListener('click', clearChat);

  function clearChat() {
    history = [];
    messages.innerHTML = '';
    messages.appendChild(emptyState);
    emptyState.style.display = '';
  }

  function showError(msg) {
    errorToast.textContent = msg;
    errorToast.style.display = 'block';
    setTimeout(() => { errorToast.style.display = 'none'; }, 4000);
  }

  function appendMessage(role, text = '') {
    if (emptyState.parentNode) emptyState.remove();

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : 'Claude';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;

    return bubble;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    userInput.disabled = true;
    userInput.value = '';
    userInput.style.height = 'auto';

    // Add to history and UI
    history.push({ role: 'user', content: text });
    appendMessage('user', text);

    const assistantBubble = appendMessage('assistant');
    assistantBubble.classList.add('cursor');

    try {
      const response = await fetch(ANTHROPIC_API, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 4096,
          stream: true,
          messages: history,
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${response.status}`);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;

          try {
            const evt = JSON.parse(data);
            if (evt.type === 'content_block_delta' && evt.delta?.type === 'text_delta') {
              fullText += evt.delta.text;
              assistantBubble.textContent = fullText;
              messages.scrollTop = messages.scrollHeight;
            }
          } catch {}
        }
      }

      assistantBubble.classList.remove('cursor');
      history.push({ role: 'assistant', content: fullText });

    } catch (err) {
      assistantBubble.classList.remove('cursor');
      assistantBubble.textContent = '⚠ ' + err.message;
      assistantBubble.style.color = '#f87171';
      history.pop(); // remove failed user message
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      userInput.disabled = false;
      userInput.focus();
    }
  }
</script>
</body>
</html>
